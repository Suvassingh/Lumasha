name: lumasha
description: Nepali language & culture learning app for children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2

  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  go_router: ^14.2.7

  supabase_flutter: ^2.5.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  just_audio: ^0.9.40
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  flutter_svg: ^2.3.0
  cached_network_image: ^3.3.1

  redis: ^4.0.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.15
  riverpod_generator: ^3.0.0

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/audio/vowels/
    - assets/audio/consonants/
    - assets/audio/songs/
    - assets/images/
    # - assets/images/badges/
    - assets/images/Boat.svg
    - assets/images/Journey.svg
    - assets/images/Child.svg
    - assets/images/Friend.svg
    - assets/images/Shakti.svg
    - assets/images/Arasa.svg
    - assets/images/Exercise.svg

  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
